<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Hable habit tracker">

  <!-- iOS uses a dedicated 180px touch icon; it is not an Android maskable icon. -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- `default` keeps iOS from rendering a black standalone-app status bar. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Hable">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">

  <!-- Modern browsers can theme the SVG; its central mark has safe adaptive-icon padding. -->
  <link rel="icon" type="image/svg+xml" href="icons/hable-adaptive.svg">

  <!-- PNG fallback for Safari/iOS and browsers without SVG favicon support. -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Hable</title>
  <link rel="manifest" href="manifest.json">
  <script src="sql-wasm.js"></script>
  <script>
    const HABLE_SERVICE_WORKER_TIMEOUT_MS = 4000;

    function boundedServiceWorkerReady() {
      if (!('serviceWorker' in navigator)) return Promise.resolve(null);
      return Promise.race([
        navigator.serviceWorker.ready,
        new Promise((resolve) => {
          window.setTimeout(() => resolve(null), HABLE_SERVICE_WORKER_TIMEOUT_MS);
        }),
      ]);
    }

    window.hablePushSubscribe = async function (publicKey) {
      if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) {
        return null;
      }
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') return null;
      const registration = await boundedServiceWorkerReady();
      if (!registration) return null;
      const existing = await registration.pushManager.getSubscription();
      const subscription = existing || await registration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: Uint8Array.from(atob(publicKey.replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0)),
      });
      return subscription.toJSON();
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
